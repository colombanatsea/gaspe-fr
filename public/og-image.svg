<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#1B7E8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#42B3D5"/>
      <stop offset="50%" style="stop-color:#6DAAAC"/>
      <stop offset="100%" style="stop-color:#5AA89A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo icon -->
  <rect x="80" y="80" width="56" height="56" rx="12" fill="url(#accent)"/>
  <text x="108" y="120" font-family="sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">G</text>
  <text x="152" y="118" font-family="sans-serif" font-size="32" font-weight="700" fill="white">GASPE</text>
  <!-- Title -->
  <text x="80" y="220" font-family="sans-serif" font-size="44" font-weight="700" fill="white">
    <tspan x="80" dy="0">Groupement des Armateurs de Services</tspan>
    <tspan x="80" dy="56">Publics Maritimes de Passages d'Eau</tspan>
  </text>
  <!-- Tagline -->
  <text x="80" y="350" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.7)">Localement ancrés. Socialement engagés.</text>
  <!-- Stats -->
  <text x="80" y="440" font-family="sans-serif" font-size="36" font-weight="700" fill="#6DAAAC">1951</text>
  <text x="80" y="465" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">CRÉATION</text>
  <text x="230" y="440" font-family="sans-serif" font-size="36" font-weight="700" fill="#6DAAAC">28</text>
  <text x="230" y="465" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">COMPAGNIES</text>
  <text x="420" y="440" font-family="sans-serif" font-size="36" font-weight="700" fill="#6DAAAC">111</text>
  <text x="420" y="465" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">NAVIRES</text>
  <text x="570" y="440" font-family="sans-serif" font-size="36" font-weight="700" fill="#6DAAAC">20M+</text>
  <text x="570" y="465" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">PASSAGERS/AN</text>
  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
</svg>
