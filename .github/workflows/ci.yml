name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm ci échoue sur des deps optional inBundle cross-platform
        # (@emnapi/* via @tailwindcss/oxide-wasm32-wasi) que Windows ne
        # tracke pas dans le lock. npm install --no-audit --no-fund est
        # tolérant et reste idempotent grâce au lock.
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 200

      - name: Unit tests
        run: npm test

      - name: Build (static export)
        run: npm run build
