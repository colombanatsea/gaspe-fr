name: Deploy Worker

# Phase 1 : déploiement automatique sur push main
#   - Applique uniquement les migrations STRUCTURELLES de workers/migrations/*.sql
#     (CREATE TABLE IF NOT EXISTS, ALTER ADD COLUMN, CREATE INDEX IF NOT EXISTS,
#     INSERT OR IGNORE seed). Toutes idempotentes par construction.
#   - Déploie le Worker.
#
# Phase 2 : exécution manuelle via workflow_dispatch (UI GitHub Actions)
#   - Bouton « Run workflow » avec input `apply_manual_migrations=true`.
#   - Applique les migrations de workers/migrations/_manual/*.sql qui peuvent
#     ÉCRASER des données utilisateur (UPDATE seeds collège A/B/C, archive
#     Kéolis, repair data slug TMC). À utiliser uniquement après backup et
#     validation équipe.
#
# Cette séparation a été introduite en session 54 (P0-5 du rapport
# docs/PRODUCTION-SAFETY-2026.md) pour éviter qu'une mise à jour future
# n'écrase silencieusement les éditions admin via UI une fois en prod.

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      apply_manual_migrations:
        description: |
          Appliquer les migrations destructives de workers/migrations/_manual/
          (UPDATE seed, INSERT OR IGNORE post-launch). À cocher uniquement
          après backup D1 manuel et validation équipe. Cf.
          docs/PRODUCTION-SAFETY-2026.md § E.
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if Cloudflare secrets are not configured
    if: ${{ vars.CF_CONFIGURED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Cloudflare credentials
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets not configured. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repository secrets."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wrangler
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g wrangler

      # ─── Phase 1 : migrations structurelles (auto à chaque push main) ───
      #
      # Comportement (durci en session 54, P1-1 + P1-2) :
      #   1. Vérifie quelles migrations sont déjà inscrites dans la table
      #      `_migrations_applied` (créée par 0034_migrations_applied.sql).
      #      Si présente → SKIP, on n'essaie même pas de re-jouer.
      #   2. Sinon, applique la migration. Si succès, INSERT dans la table.
      #   3. Si échec inattendu (autre que « duplicate column » des ALTER
      #      ré-appliquées), exit 1 → bloque le déploiement Worker.
      #   4. Skip le dossier `_manual/` (cf. phase 2).
      #
      # Avant durcissement : le workflow tournait toutes les migrations à
      # chaque push, comptait sur l'idempotence de chaque statement, et
      # laissait passer les erreurs réelles en `::warning::` (le job restait
      # vert même en cas d'échec). Cf. docs/PRODUCTION-SAFETY-2026.md § C.2.
      - name: Apply structural D1 migrations
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          set +e
          unexpected=0
          skipped=0
          applied=0

          # Helper : la migration est-elle déjà inscrite dans _migrations_applied ?
          # Retourne 0 si oui, 1 sinon (y compris si la table n'existe pas encore).
          already_applied() {
            local fname="$1"
            local out
            out=$(npx wrangler d1 execute gaspe-db --remote \
              --command "SELECT 1 FROM _migrations_applied WHERE filename = '$fname' LIMIT 1" \
              --config workers/wrangler.toml --yes 2>&1)
            # Tolérant : on cherche une trace de résultat dans la sortie JSON wrangler.
            echo "$out" | grep -qE '"1"\s*:\s*1' && return 0
            return 1
          }

          # Helper : marque une migration comme appliquée.
          mark_applied() {
            local fname="$1"
            npx wrangler d1 execute gaspe-db --remote \
              --command "INSERT OR IGNORE INTO _migrations_applied (filename) VALUES ('$fname')" \
              --config workers/wrangler.toml --yes >/dev/null 2>&1 || true
          }

          for f in workers/migrations/*.sql; do
            # Skip le dossier _manual/ : ces migrations ne sont jouées que
            # via workflow_dispatch + input apply_manual_migrations=true.
            if [[ "$f" == *"/_manual/"* ]]; then continue; fi

            fname=$(basename "$f")
            echo "::group::Migration $fname"

            if already_applied "$fname"; then
              echo "déjà appliquée (présente dans _migrations_applied) — skip"
              skipped=$((skipped + 1))
              echo "::endgroup::"
              continue
            fi

            output=$(npx wrangler d1 execute gaspe-db --remote --file "$f" --config workers/wrangler.toml --yes 2>&1)
            status=$?
            echo "$output"
            if [ $status -eq 0 ]; then
              mark_applied "$fname"
              applied=$((applied + 1))
              echo "::notice::$fname appliquée avec succès"
            else
              # ALTER ADD COLUMN ne supporte pas IF NOT EXISTS en SQLite :
              # si la migration a déjà été appliquée AVANT que la table
              # tracker n'existe (avant 0034), le re-run produira « duplicate
              # column name ». On la marque pour la skip aux prochains runs.
              if echo "$output" | grep -qiE "duplicate column name|already exists"; then
                echo "::warning::$fname : déjà appliquée (colonne existe), suite ignorée"
                mark_applied "$fname"
              else
                echo "::error::$fname : échec inattendu (voir log ci-dessus)"
                unexpected=$((unexpected + 1))
              fi
            fi
            echo "::endgroup::"
          done

          echo "Phase 1 terminée : $applied appliquée(s) maintenant, $skipped déjà appliquée(s), $unexpected échec(s) inattendu(s)"
          if [ $unexpected -gt 0 ]; then
            echo "::error::$unexpected migration(s) ont échoué pour une raison inattendue. Le déploiement Worker est bloqué."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ─── Phase 2 : migrations manuelles (UPDATE seed / repair data) ───
      # Exécutées UNIQUEMENT si workflow_dispatch + apply_manual_migrations=true.
      # JAMAIS sur push main automatique.
      - name: Apply manual / destructive D1 migrations
        if: |
          steps.check-secrets.outputs.skip != 'true' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.apply_manual_migrations == true
        run: |
          set +e
          echo "::warning::Application des migrations destructives de workers/migrations/_manual/ — assurez-vous qu'un backup D1 récent existe."
          unexpected=0
          shopt -s nullglob
          for f in workers/migrations/_manual/*.sql; do
            echo "::group::[MANUAL] Applying $f"
            output=$(npx wrangler d1 execute gaspe-db --remote --file "$f" --config workers/wrangler.toml --yes 2>&1)
            status=$?
            echo "$output"
            if [ $status -ne 0 ]; then
              if echo "$output" | grep -qiE "duplicate column name|already exists"; then
                echo "::warning::$f: déjà appliquée"
              else
                echo "::error::$f: échec inattendu (voir log)"
                unexpected=$((unexpected + 1))
              fi
            fi
            echo "::endgroup::"
          done
          if [ $unexpected -gt 0 ]; then
            echo "::error::$unexpected migration manuelle a échoué. Investiguez et restaurez le backup si nécessaire."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        if: steps.check-secrets.outputs.skip != 'true'
        run: npx wrangler deploy --config workers/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
