name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if Cloudflare secrets are not configured
    if: ${{ vars.CF_CONFIGURED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Cloudflare credentials
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets not configured. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repository secrets."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wrangler
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g wrangler

      - name: Apply D1 migrations
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          for f in workers/migrations/*.sql; do
            echo "Applying $f..."
            npx wrangler d1 execute gaspe-db --remote --file "$f" --config workers/wrangler.toml --yes || echo "Migration $f skipped (already applied or error)"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        if: steps.check-secrets.outputs.skip != 'true'
        run: npx wrangler deploy --config workers/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
